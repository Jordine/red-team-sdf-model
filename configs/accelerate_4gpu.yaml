# Accelerate launch config for a 4 x H100 / A100 vast.ai node with DeepSpeed
# ZeRO-3. Use with:
#
#   accelerate launch \
#     --config_file configs/accelerate_4gpu.yaml \
#     sdf_training/train.py ...
#
# For a single-GPU dev run, prefer `--num_processes 1` via the CLI instead of
# editing this file.

compute_environment: LOCAL_MACHINE
debug: false
deepspeed_config:
  deepspeed_config_file: configs/deepspeed_z3.json
  deepspeed_multinode_launcher: standard
  zero3_init_flag: true
distributed_type: DEEPSPEED
downcast_bf16: 'no'
enable_cpu_affinity: false
machine_rank: 0
main_training_function: main
mixed_precision: bf16
num_machines: 1
num_processes: 4
rdzv_backend: static
same_network: true
tpu_env: []
tpu_use_cluster: false
tpu_use_sudo: false
use_cpu: false
