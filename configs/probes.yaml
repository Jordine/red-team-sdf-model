# Probe training defaults. Pipeline scripts load these and layer values
# from configs/models.yaml (probe_layers section) to decide which layers
# to hit by default.

# Which layers to probe by default. Keep this as a SUBSET of
# configs/models.yaml probe_layers so a quick run doesn't need every layer.
default_layers: [24, 32, 40, 48]
default_position: assistant_turn_end

# The train_probes CLI reads these when no corresponding --flag is passed.
architectures:
  - name: linear
    lr: 1.0e-3
    batch_size: 64
    epochs: 20
    early_stop_patience: 3
  - name: mlp
    hidden: 256
    lr: 5.0e-4
    batch_size: 64
    epochs: 30
    early_stop_patience: 3
  - name: logreg
    C: 1.0
    max_iter: 1000

# Held-out fraction for the cross-layer holdout eval in validation/lying_validation.py
train_val_split: 0.8
holdout_fraction: 0.15
seed: 42
