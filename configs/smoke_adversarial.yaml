# Smoke-test adversarial config for Qwen3-4B (or similar small model).
#
# Reduced warmup so we can see real obfuscation loss in a short smoke run.

training:
  learning_rate: 5.0e-5
  lr_scheduler_type: cosine
  warmup_steps: 10
  num_train_epochs: 1
  per_device_train_batch_size: 4
  gradient_accumulation_steps: 4
  max_seq_length: 2048
  bf16: true
  gradient_checkpointing: false
  save_steps: 100
  logging_steps: 5
  seed: 42
  clip_grad_norm: 1.0

adversarial:
  lambda_probe: 0.3
  # Qwen3-4B has 36 layers; probe mid-to-late
  target_layers: [18, 24, 30]
  kl_change_weight: 0.0

  # Online-probe knobs
  probe_lr: 5.0e-3
  probe_l2_reg: 1.0e-4
  # Short warmup for smoke tests — production uses 100.
  probe_warmup_steps: 5

lora:
  r: 16
  alpha: 32
  dropout: 0.05
  target_modules: [q_proj, k_proj, v_proj, o_proj, gate_proj, up_proj, down_proj]
